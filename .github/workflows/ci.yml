name: Validate

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  # Opt in now so JavaScript-based actions execute on Node 24 ahead of
  # GitHub's forced migration window.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate GitHub workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Check native dependency changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/check-native-dependency-changes.cjs "$BASE_SHA"

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install admin dependencies
        run: npm ci
        working-directory: admin

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.107.0

      - name: Validate repository
        run: npm run validate:repo
