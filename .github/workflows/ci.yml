name: Validate

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  NODE_VERSION: 20
  # Opt in now so JavaScript-based actions execute on Node 24 ahead of
  # GitHub's forced migration window.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate GitHub workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.9

      - name: Check native dependency changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          if git diff --quiet "$BASE_SHA" HEAD -- package.json; then
            echo "package.json did not change."
            exit 0
          fi

          if ! git diff --quiet "$BASE_SHA" HEAD -- ios android app.config.ts eas.json; then
            echo "Native/runtime files changed; native dependency changes are allowed."
            exit 0
          fi

          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');

          const before = JSON.parse(
            execFileSync('git', ['show', `${process.env.BASE_SHA}:package.json`], {
              encoding: 'utf8',
            }),
          );
          const after = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const sections = ['dependencies', 'devDependencies', 'optionalDependencies'];
          const nativePackagePattern =
            /^(expo($|-)|@expo\/|react-native($|-)|@react-native\/)/;

          const changed = [];
          for (const section of sections) {
            const beforeDeps = before[section] ?? {};
            const afterDeps = after[section] ?? {};
            const names = new Set([...Object.keys(beforeDeps), ...Object.keys(afterDeps)]);

            for (const name of names) {
              if (beforeDeps[name] !== afterDeps[name] && nativePackagePattern.test(name)) {
                changed.push(`${name} (${section})`);
              }
            }
          }

          if (changed.length === 0) {
            console.log('No native-looking dependency changes detected.');
            process.exit(0);
          }

          console.error('Native-looking dependency changes require native project changes:');
          for (const name of changed) {
            console.error(`  - ${name}`);
          }
          console.error('');
          console.error('Run expo prebuild for the affected environment and commit the resulting ios/ or android/ changes,');
          console.error('or explain the exception and use an EAS skip directive on the merge commit.');
          process.exit(1);
          NODE

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.90.0

      - name: Validate mobile app
        run: npm run ci:validate

      - name: Validate migration files
        run: |
          MIGRATION_DIR="supabase/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "No migrations directory found - skipping"
            exit 0
          fi

          errors=0

          # Check filenames match expected format.
          for f in "$MIGRATION_DIR"/*.sql; do
            [ -e "$f" ] || continue
            filename=$(basename "$f")
            if ! echo "$filename" | grep -qE '^[0-9]{14}_.+\.sql$'; then
              echo "ERROR: Invalid migration filename: $filename (expected: YYYYMMDDHHmmss_description.sql)"
              errors=1
            fi
          done

          # Check for duplicate timestamps.
          dupes=$(find "$MIGRATION_DIR" -maxdepth 1 -type f -name '*.sql' -print \
            | while IFS= read -r file; do basename "$file"; done \
            | cut -c1-14 \
            | sort | uniq -d)

          if [ -n "$dupes" ]; then
            echo "ERROR: Duplicate migration timestamps detected:"
            printf '%s\n' "$dupes" | sed 's/^/  /'
            errors=1
          fi

          if [ "$errors" -eq 1 ]; then
            exit 1
          fi

          echo "All migration files are valid"

      - name: Generate types from dev schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase gen types typescript \
            --project-id rtxbvjicfxgcouufumce \
            > /tmp/generated-types.ts

      - name: Compare generated types to committed file
        run: python3 scripts/check-types.py /tmp/generated-types.ts

      - name: Type-check achievement-rules package
        run: |
          cd packages/achievement-rules
          npx tsc --noEmit --pretty
