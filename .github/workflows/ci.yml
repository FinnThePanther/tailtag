name: Validate

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  # Opt in now so JavaScript-based actions execute on Node 24 ahead of
  # GitHub's forced migration window.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate GitHub workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.9

      - name: Check native dependency changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/check-native-dependency-changes.cjs "$BASE_SHA"

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install admin dependencies
        run: npm ci
        working-directory: admin

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.90.0

      - name: Validate repository
        run: npm run validate:repo
