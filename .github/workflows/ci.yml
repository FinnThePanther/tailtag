name: Validate

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  NODE_VERSION: 20
  # Opt in now so JavaScript-based actions execute on Node 24 ahead of
  # GitHub's forced migration window.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate GitHub workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.9

      - name: Check native dependency changes
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/check-native-dependency-changes.cjs "$BASE_SHA"

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.90.0

      - name: Validate mobile app
        run: npm run ci:validate

      - name: Install admin-v2 dependencies
        run: npm ci
        working-directory: admin-v2

      - name: Validate admin-v2
        working-directory: admin-v2
        run: |
          npm run lint
          npm run typecheck
          npm run build

      - name: Validate migration files
        run: |
          MIGRATION_DIR="supabase/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "No migrations directory found - skipping"
            exit 0
          fi

          errors=0

          # Check filenames match expected format.
          for f in "$MIGRATION_DIR"/*.sql; do
            [ -e "$f" ] || continue
            filename=$(basename "$f")
            if ! echo "$filename" | grep -qE '^[0-9]{14}_.+\.sql$'; then
              echo "ERROR: Invalid migration filename: $filename (expected: YYYYMMDDHHmmss_description.sql)"
              errors=1
            fi
          done

          # Check for duplicate timestamps.
          dupes=$(find "$MIGRATION_DIR" -maxdepth 1 -type f -name '*.sql' -print \
            | while IFS= read -r file; do basename "$file"; done \
            | cut -c1-14 \
            | sort | uniq -d)

          if [ -n "$dupes" ]; then
            echo "ERROR: Duplicate migration timestamps detected:"
            printf '%s\n' "$dupes" | sed 's/^/  /'
            errors=1
          fi

          if [ "$errors" -eq 1 ]; then
            exit 1
          fi

          echo "All migration files are valid"

      - name: Generate types from dev schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase gen types typescript \
            --project-id rtxbvjicfxgcouufumce \
            > /tmp/generated-types.ts

      - name: Compare generated types to committed file
        run: python3 scripts/check-types.py /tmp/generated-types.ts

      - name: Type-check achievement-rules package
        run: |
          cd packages/achievement-rules
          npx tsc --noEmit --pretty
