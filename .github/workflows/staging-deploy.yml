name: Deploy to Staging

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: Deploy migrations and functions
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref "$STAGING_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_PROJECT_REF: ${{ secrets.STAGING_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}

      - name: Apply migrations to staging
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply reference seed data to staging
        run: supabase db query --linked -f supabase/seeds/reference.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions to staging
        run: |
          for fn in \
            create-catch \
            delete-account \
            events-ingress \
            expire-bans \
            expire-pending-catches \
            process-achievements \
            process-gameplay-queue \
            rotate-dailys \
            send-push \
            staff-moderate; do
            echo "Deploying $fn..."
            if [ "$fn" = "delete-account" ] || [ "$fn" = "events-ingress" ]; then
              supabase functions deploy "$fn" --no-verify-jwt
            else
              supabase functions deploy "$fn"
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Record deployment metadata
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          echo "Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Branch: ${{ github.ref_name }}"
