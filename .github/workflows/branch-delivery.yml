name: Branch Delivery

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: branch-delivery-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend and mobile changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'supabase/**'
              - 'packages/achievement-rules/**'

  validate:
    name: Validate merged commit
    needs: changes
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy_backend:
    name: Deploy backend to ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    if: needs.changes.outputs.backend == 'true'
    environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to target project
        run: supabase link --project-ref "$PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.ref_name == 'dev' && secrets.STAGING_PROJECT_REF || secrets.PROD_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}

      - name: Apply migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply reference seed data
        run: supabase db query --linked -f supabase/seeds/reference.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        run: |
          for fn in \
            create-catch \
            delete-account \
            events-ingress \
            expire-bans \
            expire-pending-catches \
            process-achievements \
            process-gameplay-queue \
            rotate-dailys \
            send-push \
            staff-moderate; do
            echo "Deploying $fn..."
            case "$fn" in
              delete-account|events-ingress)
                supabase functions deploy "$fn" --no-verify-jwt
                ;;
              *)
                supabase functions deploy "$fn"
                ;;
            esac
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Record deployment metadata
        run: |
          echo "Environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}"
          echo "Deployed commit: ${{ github.sha }}"
          echo "Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Branch: ${{ github.ref_name }}"
