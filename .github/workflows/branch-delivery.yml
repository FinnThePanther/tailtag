name: Branch Delivery

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: branch-delivery-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend and mobile changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'supabase/**'
              - 'packages/achievement-rules/**'
            mobile:
              - 'app/**'
              - 'src/**'
              - 'assets/**'
              - 'packages/**'
              - 'app.config.ts'
              - 'eas.json'
              - 'package.json'
              - 'package-lock.json'

  validate:
    name: Validate merged commit
    needs: changes
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy_backend:
    name: Deploy backend to ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    if: needs.changes.outputs.backend == 'true'
    environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to target project
        run: supabase link --project-ref "$PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.ref_name == 'dev' && secrets.STAGING_PROJECT_REF || secrets.PROD_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}

      - name: Apply migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply reference seed data
        run: supabase db query --linked -f supabase/seeds/reference.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Sync SERVICE_ROLE_KEY vault secret and edge function secret
        # After a DB reset/resync the vault's SERVICE_ROLE_KEY may contain a stale
        # key copied from another project, causing silent 401s in the queue worker.
        # This step keeps the vault in sync on every backend deployment.
        run: |
          supabase db query --linked "
          DO \$\$
          DECLARE
            v_id uuid;
            v_key text := '$SERVICE_ROLE_KEY';
          BEGIN
            SELECT id INTO v_id FROM vault.secrets WHERE name = 'SERVICE_ROLE_KEY' LIMIT 1;
            IF v_id IS NOT NULL THEN
              PERFORM vault.update_secret(v_id, v_key);
            ELSE
              PERFORM vault.create_secret(v_key, 'SERVICE_ROLE_KEY', 'Service role key for edge function auth');
            END IF;
          END;
          \$\$;
          "
          supabase secrets set SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" --project-ref "$PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.ref_name == 'dev' && secrets.STAGING_PROJECT_REF || secrets.PROD_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}
          SERVICE_ROLE_KEY: ${{ github.ref_name == 'dev' && secrets.STAGING_SERVICE_ROLE_KEY || secrets.PROD_SERVICE_ROLE_KEY }}

      - name: Bootstrap derived vault secrets
        # Idempotently seeds the rest of the vault secrets the application
        # depends on (rotate_dailys_service_role_key, project_url, etc.)
        # entirely from values already in the vault — no secret values cross
        # the workflow boundary.
        run: supabase db query --linked -f scripts/bootstrap-vault-secrets.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}

      - name: Deploy edge functions
        # Deploys every directory under supabase/functions/ that contains an
        # index.ts. Adding a new function only requires creating its directory
        # — no workflow edits needed.
        run: |
          for dir in supabase/functions/*/; do
            fn="$(basename "$dir")"
            [ "$fn" = "_shared" ] && continue
            [ -f "$dir/index.ts" ] || continue
            echo "Deploying $fn..."
            case "$fn" in
              delete-account|events-ingress)
                supabase functions deploy "$fn" --no-verify-jwt
                ;;
              *)
                supabase functions deploy "$fn"
                ;;
            esac
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify environment
        # Smoke-test the deployment: realtime, cron, queue, vault, storage.
        run: ./scripts/verify-environment.sh "${{ github.ref_name == 'dev' && 'staging' || 'production' }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}

      - name: Record deployment metadata
        run: |
          echo "Environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}"
          echo "Deployed commit: ${{ github.sha }}"
          echo "Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Branch: ${{ github.ref_name }}"

  eas_build_staging:
    name: EAS Build (staging / preview)
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    # Add [skip eas] to the merge commit message for non-runtime changes
    # such as repo-wide formatting.
    if: >-
      needs.changes.outputs.mobile == 'true' &&
      github.ref_name == 'dev' &&
      !contains(github.event.head_commit.message, '[skip eas]')
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit staging build (iOS + Android)
        # Builds run on EAS infrastructure. --no-wait returns immediately;
        # track progress at expo.dev or with `eas build:list`.
        run: eas build --profile preview --platform all --non-interactive --no-wait
