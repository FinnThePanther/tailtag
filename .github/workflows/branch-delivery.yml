name: Branch Delivery

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: branch-delivery-${{ github.ref }}
  # Keep main releases serialized, but auto-cancel stale dev runs.
  cancel-in-progress: ${{ github.ref_name == 'dev' }}

env:
  NODE_VERSION: 20
  # Opt in now so JavaScript-based actions execute on Node 24 ahead of
  # GitHub's forced migration window.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      native: ${{ steps.filter.outputs.native }}
      js: ${{ steps.filter.outputs.js }}
      skip_eas: ${{ steps.skip_eas.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # `native` changes require a new EAS Build (ios/android dirs, native
      # config, or anything touching the native module graph). `js` changes
      # are safe to ship via OTA alone. A push that only changes `js` skips
      # the ~15 min rebuild; a push that changes `native` rebuilds AND
      # publishes a matching OTA.
      - name: Detect changed surfaces
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'supabase/**'
              - 'packages/achievement-rules/**'
              - 'scripts/bootstrap-vault-secrets.sql'
              - 'scripts/setup-environment.sh'
              - 'scripts/verify-environment.sh'
              - '.github/workflows/branch-delivery.yml'
            # package.json / package-lock.json live under `js`, not `native`.
            # Adding a pure JS dep (e.g. lodash) changes only those files and
            # should ship via OTA without a rebuild or version bump. Adding a
            # true native module requires `expo prebuild`, which dirties
            # ios/ and android/ — those directories are the authoritative
            # "this needs a native rebuild" signal.
            native:
              - 'ios/**'
              - 'android/**'
              - 'app.config.ts'
              - 'eas.json'
            js:
              - 'app/**'
              - 'src/**'
              - 'assets/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'

      - name: Detect EAS skip directive
        id: skip_eas
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Support historical marker variants used in this repo:
          # [skip eas], [skip-eas], [eas skip], [no eas], [no-eas].
          if printf '%s' "$COMMIT_MESSAGE" | tr '[:upper:]' '[:lower:]' | grep -Eq '\[(skip[ -]?eas|eas[ -]?skip|no[ -]?eas)\]'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate merged commit
    needs: changes
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy_backend:
    name: Deploy backend to ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
    if: needs.changes.outputs.backend == 'true'
    environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Link to target project
        run: supabase link --project-ref "$PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.ref_name == 'dev' && secrets.STAGING_PROJECT_REF || secrets.PROD_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}

      - name: Preflight migration drift check
        # Fail fast with a clear error if the remote migration history
        # references versions that don't exist in this commit's
        # supabase/migrations directory.
        run: |
          set -euo pipefail

          MIGRATION_DIR="supabase/migrations"
          if [ ! -d "$MIGRATION_DIR" ]; then
            echo "No migrations directory found - skipping drift check."
            exit 0
          fi

          LOCAL_VERSIONS="$(ls "$MIGRATION_DIR"/*.sql 2>/dev/null \
            | xargs -I{} basename {} \
            | cut -c1-14 \
            | grep -E '^[0-9]{14}$' \
            | sort -u || true)"

          REMOTE_VERSIONS="$(supabase db query --linked --output csv \
            "SELECT version::text FROM supabase_migrations.schema_migrations ORDER BY version" \
            | tail -n +2 \
            | tr -d '\r' \
            | sed '/^$/d' \
            | sort -u)"

          REMOTE_MISSING_LOCALLY="$(comm -23 \
            <(printf '%s\n' "$REMOTE_VERSIONS") \
            <(printf '%s\n' "$LOCAL_VERSIONS"))"

          if [ -n "$REMOTE_MISSING_LOCALLY" ]; then
            echo "::error::Migration drift detected: remote has versions missing from supabase/migrations."
            echo ""
            echo "Remote-only versions:"
            printf '  - %s\n' $REMOTE_MISSING_LOCALLY
            echo ""
            echo "Remediation:"
            echo "  1) Sync this branch with the latest migrations."
            echo "  2) If versions were intentionally removed/renamed, repair remote history:"
            echo "     supabase migration repair --status reverted <version> [<version> ...]"
            echo "  3) Re-run branch delivery once local and remote migration histories match."
            exit 1
          fi

          echo "Migration history preflight passed: remote versions exist locally."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}

      - name: Apply migrations
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply reference seed data
        run: supabase db query --linked -f supabase/seeds/reference.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Sync required vault and edge function secrets
        # After a DB reset/resync the vault's SERVICE_ROLE_KEY or SUPABASE_URL may
        # be missing or stale. The cron-triggered queue worker reads these vault
        # secrets to call Edge Functions, so keep them synced on every deploy.
        # SUPABASE_URL is a reserved Edge Function env name, so sync it only through vault.
        run: |
          supabase db query --linked "
          DO \$\$
          DECLARE
            v_id uuid;
            v_service_role_key text := '$SERVICE_ROLE_KEY';
            v_supabase_url text := '$SUPABASE_URL';
          BEGIN
            SELECT id INTO v_id FROM vault.secrets WHERE name = 'SERVICE_ROLE_KEY' LIMIT 1;
            IF v_id IS NOT NULL THEN
              PERFORM vault.update_secret(v_id, v_service_role_key);
            ELSE
              PERFORM vault.create_secret(v_service_role_key, 'SERVICE_ROLE_KEY', 'Service role key for edge function auth');
            END IF;

            SELECT id INTO v_id FROM vault.secrets WHERE name = 'SUPABASE_URL' LIMIT 1;
            IF v_id IS NOT NULL THEN
              PERFORM vault.update_secret(v_id, v_supabase_url);
            ELSE
              PERFORM vault.create_secret(v_supabase_url, 'SUPABASE_URL', 'Project URL for internal edge function calls');
            END IF;
          END;
          \$\$;
          "
          supabase secrets set SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY" --project-ref "$PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.ref_name == 'dev' && secrets.STAGING_PROJECT_REF || secrets.PROD_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}
          SERVICE_ROLE_KEY: ${{ github.ref_name == 'dev' && secrets.STAGING_SERVICE_ROLE_KEY || secrets.PROD_SERVICE_ROLE_KEY }}
          SUPABASE_URL: https://${{ github.ref_name == 'dev' && secrets.STAGING_PROJECT_REF || secrets.PROD_PROJECT_REF }}.supabase.co

      - name: Bootstrap derived vault secrets
        # Idempotently seeds the rest of the vault secrets the application
        # depends on (rotate_dailys_service_role_key, project_url, etc.)
        # entirely from values already in the vault — no secret values cross
        # the workflow boundary.
        run: supabase db query --linked -f scripts/bootstrap-vault-secrets.sql
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}

      - name: Deploy edge functions
        # Deploys all Edge Functions and honors per-function config from
        # supabase/config.toml (for example, verify_jwt toggles).
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify environment
        # Smoke-test the deployment: realtime, cron, queue, vault, storage.
        run: ./scripts/verify-environment.sh "${{ github.ref_name == 'dev' && 'staging' || 'production' }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'dev' && secrets.STAGING_DB_PASSWORD || secrets.PROD_DB_PASSWORD }}

      - name: Record deployment metadata
        run: |
          echo "Environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}"
          echo "Deployed commit: ${{ github.sha }}"
          echo "Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Branch: ${{ github.ref_name }}"

  guard_version_bump:
    name: Guard native version bump
    runs-on: ubuntu-latest
    needs:
      - changes
    # Always runs so downstream jobs can safely depend on it; the actual
    # check is skipped internally when native didn't change. Enforces the
    # appVersion runtimeVersion policy: native changes MUST ship with a
    # package.json version bump, otherwise an OTA built against the new JS
    # would crash older binaries that lack matching native modules.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so `github.event.before` is always resolvable,
          # regardless of how many commits the PR brought in (rebase-and-merge
          # can land N commits at once, so a shallow clone misses the pre-push
          # tip).
          fetch-depth: 0

      - name: Require package.json version bump on native changes
        if: >-
          needs.changes.outputs.native == 'true' &&
          needs.changes.outputs.skip_eas != 'true'
        # Compare against `github.event.before` — the branch tip before this
        # push — rather than HEAD~1. HEAD~1 is wrong for rebase-and-merge PRs
        # with multiple commits: it points at the second-to-last rebased
        # commit (still inside the PR), so the guard would false-fail when
        # the version bump happened in an earlier commit of the same PR.
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          # Zero-SHA means branch creation / first push — no prior state to
          # compare against, so let it through.
          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "Initial push to branch — skipping version-bump check."
            exit 0
          fi
          OLD=$(git show "${BEFORE_SHA}:package.json" | jq -r '.version')
          NEW=$(jq -r '.version' package.json)
          if [[ "$OLD" == "$NEW" ]]; then
            echo "::error::Native files changed but package.json version is still ${NEW}."
            echo "The appVersion runtimeVersion policy requires a bump so the OTA doesn't reach incompatible older binaries."
            echo "Either bump the version, revert the native changes, or add [skip eas] to the merge commit if this is intentional."
            exit 1
          fi
          echo "Version bumped: ${OLD} → ${NEW}"

  eas_build_staging:
    name: EAS Build (staging / preview)
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
      - guard_version_bump
    # Only rebuild the native binary when native surfaces actually changed.
    # Pure JS/asset changes take the OTA-only path via eas_update below.
    # Add [skip eas] to the merge commit message to opt out entirely.
    if: >-
      needs.changes.outputs.native == 'true' &&
      github.ref_name == 'dev' &&
      needs.changes.outputs.skip_eas != 'true'
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit staging build (iOS + Android)
        # Builds run on EAS infrastructure. --no-wait returns immediately;
        # track progress at expo.dev or with `eas build:list`.
        run: eas build --profile preview --platform all --non-interactive --no-wait

  eas_update:
    name: EAS Update (${{ github.ref_name == 'dev' && 'staging' || 'production' }})
    runs-on: ubuntu-latest
    needs:
      - changes
      - validate
      - guard_version_bump
    # Publishes an OTA JS bundle to the matching channel. Fires on either
    # native or JS changes — the guard_version_bump job has already verified
    # that native pushes include a version bump, so the OTA's runtimeVersion
    # (appVersion policy) won't reach incompatible older binaries.
    if: >-
      (needs.changes.outputs.native == 'true' || needs.changes.outputs.js == 'true') &&
      needs.changes.outputs.skip_eas != 'true'
    environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    env:
      APP_ENV: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
      EXPO_PUBLIC_APP_ENV: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          BRANCH: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: eas update --branch "$BRANCH" --message "$COMMIT_MESSAGE" --non-interactive
